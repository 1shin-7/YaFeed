name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5

      - name: Decode Keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > yafeed.jks

      - name: Create keystore.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "storeFile=yafeed.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Build Mobile Release APK
        run: ./gradlew :mobile:assembleRelease

      - name: Build Wear Release APK
        run: ./gradlew :wear:assembleRelease

      - name: Rename Mobile APKs
        run: |
          cd mobile/build/outputs/apk/release
          mv mobile-release.apk yafeed-mobile-release.apk

      - name: Rename Wear APKs
        run: |
          cd wear/build/outputs/apk/release
          mv wear-release.apk yafeed-wear-release.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/build/outputs/apk/release/yafeed-mobile-*.apk
            wear/build/outputs/apk/release/yafeed-wear-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
