name: Dev Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Build Mobile Debug APK
        run: ./gradlew :mobile:assembleDebug

      - name: Build Wear Debug APK
        run: ./gradlew :wear:assembleDebug

      - name: Rename Mobile APKs
        run: |
          cd mobile/build/outputs/apk/debug
          for file in *.apk; do
            mv "$file" "yafeed-mobile-debug-${file}"
          done

      - name: Rename Wear APKs
        run: |
          cd wear/build/outputs/apk/debug
          for file in *.apk; do
            mv "$file" "yafeed-wear-debug-${file}"
          done

      - name: Upload Mobile APKs
        run: |
          cd mobile/build/outputs/apk/debug
          for file in yafeed-mobile-debug-*.apk; do
            name=$(basename "$file" .apk)
            echo "Uploading $file as $name"
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-mobile-debug-arm64-v8a
          path: mobile/build/outputs/apk/debug/yafeed-mobile-debug-*arm64-v8a*.apk
          retention-days: 7
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-mobile-debug-armeabi-v7a
          path: mobile/build/outputs/apk/debug/yafeed-mobile-debug-*armeabi-v7a*.apk
          retention-days: 7
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-mobile-debug-universal
          path: mobile/build/outputs/apk/debug/yafeed-mobile-debug-*universal*.apk
          retention-days: 7
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-wear-debug-arm64-v8a
          path: wear/build/outputs/apk/debug/yafeed-wear-debug-*arm64-v8a*.apk
          retention-days: 7
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-wear-debug-armeabi-v7a
          path: wear/build/outputs/apk/debug/yafeed-wear-debug-*armeabi-v7a*.apk
          retention-days: 7
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yafeed-wear-debug-universal
          path: wear/build/outputs/apk/debug/yafeed-wear-debug-*universal*.apk
          retention-days: 7
          if-no-files-found: ignore
