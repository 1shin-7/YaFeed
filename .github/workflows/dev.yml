name: Dev Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Build Mobile Debug APK
        run: ./gradlew :mobile:assembleDebug

      - name: Build Wear Debug APK
        run: ./gradlew :wear:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/build/outputs/apk/debug/*.apk
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: wear-debug-apk
          path: wear/build/outputs/apk/debug/*.apk
          retention-days: 7
